short_bio: >-
  <p>
    I am an MS by Research student in the Department of Computer Science & Engineering at
    <a href="https://www.iitkgp.ac.in/" target="_blank">IIT Kharagpur</a>, advised by
    <a href="https://cse.iitkgp.ac.in/~pawang/" target="_blank">Dr. Pawan Goyal</a>.
  </p>
  <p>
    My research focuses on <strong>diffusion-based generative models for language</strong>,
    latent representations and structured prediction, self-supervised and contrastive learning,
    and foundations of generative models for <strong>low-resource and morphologically rich languages</strong>
    (especially Sanskrit and Indic languages).
  </p>
  <p>
    I was a Research Fellow Intern at <strong>AMD</strong> (Bengaluru), where I developed
    an adaptive multi-LLM routing framework that achieved a 37.9% reduction in inference costs
    while retaining 97.5% of baseline performance.
  </p>

